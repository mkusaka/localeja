name: Lint GitHub Actions security
on: push

permissions:
  contents: read

jobs:
  zizmor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install zizmor
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download --repo woodruffw/zizmor --pattern 'zizmor-*-x86_64-unknown-linux-gnu.tar.gz' --output - | tar -xz
      - name: Run zizmor
        run: ./zizmor .github/workflows/
